name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build TypeScript codebase
        run: npm run build

      - name: Run unit tests
        run: npm test

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Release & Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://npm.pkg.github.com'

      - name: Git configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log --oneline "$LATEST_TAG"..HEAD)
          fi

          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|[a-z]+\!:"; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qE "feat(\(.+\))?: "; then
            BUMP_TYPE="minor"
          fi

          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "Bumping version type: $BUMP_TYPE"

      - name: Generate CHANGELOG
        id: changelog
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          DATE=$(date -u +"%Y-%m-%d")

          {
            echo "## [Unreleased] - $DATE"
            echo ""
            echo "### Features"
            git log --oneline "$LATEST_TAG"..HEAD 2>/dev/null | grep -iE "feat(\(.+\))?: " | sed 's/^.\{7,\} /- /' || echo "- No features"
            echo ""
            echo "### Bug Fixes"
            git log --oneline "$LATEST_TAG"..HEAD 2>/dev/null | grep -iE "fix(\(.+\))?: " | sed 's/^.\{7,\} /- /' || echo "- No fixes"
            echo ""
            echo "### Other Changes"
            git log --oneline "$LATEST_TAG"..HEAD 2>/dev/null | grep -ivE "(feat\(|fix\(|chore\(release\)|Merge)" | sed 's/^.\{7,\} /- /' || echo "- No other changes"
          } > RELEASE_NOTES.md

          cat RELEASE_NOTES.md

      - name: Bump version
        id: version
        run: |
          npm version ${{ steps.bump.outputs.bump_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags

      - name: Build project
        run: npm run build

      - name: Pack npm package
        run: npm pack

      - name: Publish to GitHub Packages
        run: npm publish *.tgz --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          files: '*.tgz'
          generate_release_notes: false
